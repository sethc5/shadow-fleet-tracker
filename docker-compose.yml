services:
  sft:
    build: .
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    command: ["--help"]

  ingest:
    build: .
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    command: ["ingest", "--source", "all"]

  score:
    build: .
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    command: ["score"]

  digest:
    build: .
    volumes:
      - ./data:/app/data
      - ./data/digests:/app/data/digests
    env_file:
      - .env
    command: ["digest"]

