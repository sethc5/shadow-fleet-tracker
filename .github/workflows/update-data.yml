name: Update Data And Docs

on:
  schedule:
    # Every hour at :17 UTC.
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: data-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Ingest OFAC And Build Site
        run: |
          rm -f data/vessels.db
          mkdir -p data/raw
          python -m src.cli ingest --source ofac --force
          python -m src.cli unpack-sdn --output docs/ofac_sdn_vessels.json --force
          python -m src.cli site
          echo "=== Generated files ==="
          ls -la docs/
          echo "=== Data timestamp ==="
          head -3 docs/data.json

      - name: Commit And Push If Changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          echo "=== Checking for changes ==="
          git status
          
          if git diff --quiet -- docs; then
            echo "No docs changes detected."
            exit 0
          fi
          
          echo "=== Changes detected, committing ==="
          git add docs
          git commit -m "auto-update docs ($(date -u +'%Y-%m-%d %H:%M UTC'))"
          echo "=== Pushing changes ==="
          git push origin main
          echo "=== Push complete ==="
