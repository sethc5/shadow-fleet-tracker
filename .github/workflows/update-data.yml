name: Update Data And Docs

on:
  schedule:
    # Every hour at :17 UTC.
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: data-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Ingest OFAC And Build Site
        run: |
          python -m src.cli ingest --source ofac --force
          python -m src.cli unpack-sdn --output docs/ofac_sdn_vessels.json
          python -m src.cli site

      - name: Commit And Push If Changed
        run: |
          if git diff --quiet -- docs; then
            echo "No docs changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          git commit -m "auto-update docs ($(date -u +'%Y-%m-%d %H:%M UTC'))"
          git push
